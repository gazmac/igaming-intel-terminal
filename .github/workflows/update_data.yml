name: Daily iGaming Data Refresh

on:
  schedule:
    # Runs at 06:00 AM UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch: # Adds a button so you can run it manually anytime

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Pipeline (AI Extraction & Scraping)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push Updated JSON
        run: |
          git config --global user.name "DataBot"
          git config --global user.email "databot@github.com"
          git add gambling_stocks_live.json
          # Only commit if the file actually changed to avoid empty commit errors
          git diff-index --quiet HEAD || git commit -m "Automated Data Update: $(date)"
          git push
