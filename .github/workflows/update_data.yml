name: Update Gaming Terminal Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas feedparser yfinance google-genai python-dateutil beautifulsoup4 openpyxl PyPDF2
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Regulatory Data Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python regulatory_scraper.py

    - name: Run AI Calendar Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python calendar_agent.py

    - name: Run Main Financial & AI Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Commit and Push Updated JSONs
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated System Update: Regulatory, Calendar, and Equities" && git push)
