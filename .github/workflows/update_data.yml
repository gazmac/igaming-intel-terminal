name: Update Gaming Terminal Data

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger the script from the Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas feedparser yfinance google-genai python-dateutil

    - name: Run Regulatory Data Scraper
      run: python regulatory_scraper.py

    - name: Run Main Financial & AI Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Commit and Push Updated JSONs
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add gambling_stocks_live.json regulatory_data.json
        # Only commit if there are actual changes to prevent empty commit errors
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data update: Pricing, AI News & Regulatory" && git push)
