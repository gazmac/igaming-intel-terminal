<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Intelligence Terminal</title>
    <script src="https://code.highcharts.com/stock/highstock.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --positive: #22c55e;
            --negative: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        /* NEW CARD HEADER WITH LOGO */
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .company-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: white;
            margin-right: 12px;
            object-fit: contain;
            padding: 2px;
            border: 1px solid #334155;
        }

        .header-text h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .header-text span {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: bold;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
        }

        .price-main {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .metric-item {
            background: #0f172a;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }

        .metric-label { color: var(--text-dim); }

        .chart-container {
            height: 200px;
            width: 100%;
            margin-bottom: 15px;
        }

        .news-box {
            font-size: 0.8rem;
            border-top: 1px solid #334155;
            padding-top: 10px;
        }

        .news-item {
            margin-bottom: 5px;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .sentiment-bar {
            height: 4px;
            background: #334155;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .sentiment-fill { height: 100%; transition: width 1s; }
    </style>
</head>
<body>

    <div class="header">
        <h1>iGaming Intelligence Terminal</h1>
        <div id="last-update" style="color: var(--text-dim); font-size: 0.9rem;"></div>
    </div>

    <div class="grid" id="stock-grid">
        </div>

    <script>
        // Fallback function for logos
        function handleLogoError(img) {
            img.onerror = null; 
            img.src = `https://ui-avatars.com/api/?name=${img.alt}&background=random&color=fff&rounded=true`;
        }

        async function loadDashboard() {
            try {
                const response = await fetch('gambling_stocks_live.json');
                const data = await response.json();
                const grid = document.getElementById('stock-grid');
                
                document.getElementById('last-update').innerText = `Live Market Data: ${new Date().toLocaleString()}`;

                data.forEach(stock => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const beatMissClass = stock.eps_beat_miss_pct >= 0 ? 'positive' : 'negative';
                    const sentimentColor = stock.sentiment > 60 ? '#22c55e' : (stock.sentiment < 40 ? '#ef4444' : '#eab308');

                    card.innerHTML = `
                        <div class="card-header">
                            <img src="${stock.logo}" alt="${stock.company}" class="company-logo" onerror="handleLogoError(this)">
                            <div class="header-text">
                                <h3>${stock.company}</h3>
                                <span>${stock.ticker} · ${stock.base_country}</span>
                            </div>
                        </div>

                        <div class="price-row">
                            <div class="price-main">${stock.last_price}</div>
                            <div style="font-size: 0.8rem; color: var(--text-dim)">MCap: ${stock.market_cap_str}</div>
                        </div>

                        <div class="metric-grid">
                            <div class="metric-item"><span class="metric-label">P/E</span><span>${stock.pe_ratio}</span></div>
                            <div class="metric-item"><span class="metric-label">D/E</span><span>${stock.debt_to_equity}</span></div>
                            <div class="metric-item"><span class="metric-label">${stock.actuals.rev_label} (FY)</span><span>${stock.actuals.revenue_fy}</span></div>
                            <div class="metric-item"><span class="metric-label">EBITDA</span><span>${stock.actuals.ebitda}</span></div>
                        </div>

                        <div id="chart-${stock.ticker.replace('.', '-')}" class="chart-container"></div>

                        <div class="news-box">
                            <strong>Intelligence Summary:</strong>
                            ${stock.news_summary.map(n => `<div class="news-item">• ${n}</div>`).join('')}
                            <div class="sentiment-bar">
                                <div class="sentiment-fill" style="width: ${stock.sentiment}%; background: ${sentimentColor}"></div>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                    renderChart(stock);
                });
            } catch (e) {
                console.error("Dashboard Load Error:", e);
            }
        }

        function renderChart(stock) {
            const containerId = `chart-${stock.ticker.replace('.', '-')}`;
            const chartData = stock.history["1m"]; // Defaulting to 1 Month view

            Highcharts.chart(containerId, {
                chart: { backgroundColor: 'transparent', height: 200, type: 'area', margin: [0,0,0,0] },
                title: { text: null },
                credits: { enabled: false },
                xAxis: { visible: false },
                yAxis: { visible: false },
                legend: { enabled: false },
                tooltip: { xDateFormat: '%b %e, %Y', shared: true },
                plotOptions: {
                    area: {
                        fillColor: {
                            linearGradient: { x1: 0, y1: 0, x2: 0, y2: 1 },
                            stops: [[0, '#38bdf888'], [1, '#38bdf800']]
                        },
                        lineColor: '#38bdf8',
                        lineWidth: 2,
                        marker: { enabled: false }
                    }
                },
                series: [{ name: 'Price', data: chartData }]
            });
        }

        loadDashboard();
    </script>
</body>
</html>
