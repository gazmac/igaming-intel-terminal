<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Intelligence Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.css">
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/tests/assets/jquery-jvectormap-world-mill-en.js"></script>
    <style>
        .sparkline-container { width: 80px; height: 30px; }
        @media (min-width: 768px) { .sparkline-container { width: 100px; height: 35px; } }
        #main-chart { min-height: 300px; }
        /* Prevent body scroll when modal is open */
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 p-3 md:p-6 font-sans text-slate-900">

    <div class="max-w-[120rem] mx-auto">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end border-b border-slate-200 pb-4 gap-2">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-800">iGaming Intel <span class="text-blue-600">Terminal</span></h1>
            </div>
            <div id="last-update" class="text-[10px] md:text-xs text-slate-400 font-mono uppercase tracking-widest">Loading Data...</div>
        </header>

        <div class="hidden md:block bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <table class="min-w-full text-left whitespace-nowrap">
                <thead class="bg-slate-800 text-slate-300 text-[10px] uppercase font-bold tracking-wider">
                    <tr>
                        <th class="px-4 py-3">Equity</th>
                        <th class="px-4 py-3">Sentiment & Trend</th>
                        <th class="px-4 py-3">Next Earnings</th>
                        <th class="px-4 py-3 border-l border-slate-600">EPS (Act/Est)</th>
                        <th class="px-4 py-3">Rev / EBITDA</th>
                        <th class="px-4 py-3">Net Income</th>
                        <th class="px-4 py-3 border-l border-slate-600">NGR & FCF</th>
                        <th class="px-4 py-3">Jurisdictions</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <div id="mobile-list" class="md:hidden space-y-4">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden flex items-center justify-center z-50 p-0 md:p-4">
        <div class="bg-white w-full h-full md:h-auto md:max-w-7xl md:rounded-3xl md:max-h-[95vh] overflow-y-auto relative p-6 md:p-10">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-900 text-4xl md:text-3xl z-50">&times;</button>
            
            <div class="flex flex-col md:flex-row justify-between items-start mb-6 mt-4 md:mt-0 gap-4">
                <div>
                    <h2 id="m-name" class="text-2xl md:text-3xl font-black text-slate-900"></h2>
                    <p id="m-ticker" class="text-slate-500 font-mono text-sm"></p>
                </div>
                <select id="timeframe-select" onchange="updateMainChart()" class="w-full md:w-auto bg-slate-100 border-none text-sm font-bold rounded-xl px-4 py-3 md:py-2">
                    <option value="1w">1 Week</option>
                    <option value="1m">1 Month</option>
                    <option value="6m">6 Months</option>
                    <option value="1y">1 Year</option>
                    <option value="5y" selected>5 Years</option>
                </select>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                <div class="lg:col-span-2 space-y-4 md:space-y-6">
                    <div id="main-chart" class="w-full bg-slate-50 rounded-2xl border p-2 md:p-4"></div>
                    <div id="m-map" class="h-48 md:h-64 bg-slate-50 rounded-2xl border overflow-hidden"></div>
                </div>
                
                <div class="bg-blue-600 rounded-2xl p-6 md:p-8 text-white shadow-lg shadow-blue-200">
                    <h3 class="text-[10px] font-black uppercase opacity-70 mb-4 tracking-widest">AI Sentiment Engine</h3>
                    <div class="text-5xl md:text-6xl font-black mb-6" id="m-sentiment-val"></div>
                    <div class="space-y-4">
                        <h4 class="text-xs font-bold uppercase opacity-70 border-b border-white/20 pb-2">Strategic Summary</h4>
                        <div id="m-news" class="text-sm md:text-base space-y-4 opacity-95 leading-relaxed"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        let activeTicker = null;
        let chartInstance = null;

        async function init() {
            try {
                const cacheBuster = new Date().getTime();
                const res = await fetch(`gambling_stocks_live.json?t=${cacheBuster}`);
                db = await res.json();
                document.getElementById('last-update').innerText = `Refreshed: ${new Date().toLocaleTimeString()}`;
                renderUI();
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function renderUI() {
            const tbody = document.getElementById('table-body');
            const mobileList = document.getElementById('mobile-list');
            tbody.innerHTML = '';
            mobileList.innerHTML = '';
            
            db.forEach(s => {
                const dateObj = new Date(s.release_gmt);
                const dateStr = dateObj.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
                const isBeat = s.eps_beat_miss_pct > 0;
                const beatHtml = `<span class="${isBeat ? 'text-green-600' : 'text-red-500'} font-black text-[10px]">${isBeat ? '▲' : '▼'} ${Math.abs(s.eps_beat_miss_pct)}%</span>`;

                // 1. DESKTOP ROW
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 cursor-pointer border-b border-slate-50 transition-colors";
                tr.onclick = () => openModal(s.ticker);
                tr.innerHTML = `
                    <td class="px-4 py-5"><div class="font-black text-slate-800 text-base">${s.company}</div><div class="text-[10px] text-slate-500 font-mono">${s.ticker}</div></td>
                    <td class="px-4 py-5"><div class="flex items-center gap-4"><span class="text-lg font-black ${s.sentiment > 50 ? 'text-green-500' : 'text-slate-700'}">${s.sentiment}</span><div id="spark-${s.ticker}" class="sparkline-container"></div></div></td>
                    <td class="px-4 py-5 font-bold text-slate-800">${dateStr} 2026</td>
                    <td class="px-4 py-5 border-l border-slate-100 bg-slate-50/50">
                        <div class="font-mono text-slate-800 font-bold text-sm">${s.actuals.eps_actual} <span class="text-slate-400 font-normal">/ ${s.actuals.eps_forecast}</span></div>
                        ${beatHtml}
                    </td>
                    <td class="px-4 py-5 text-[11px] text-slate-700 space-y-1">
                        <div><span class="font-bold text-slate-400 uppercase">Rev:</span> ${s.actuals.revenue}</div>
                        <div><span class="font-bold text-slate-400 uppercase">EBT:</span> ${s.actuals.ebitda}</div>
                    </td>
                    <td class="px-4 py-5 font-bold text-sm ${s.actuals.net_income.includes('-') ? 'text-red-600' : 'text-slate-800'}">${s.actuals.net_income}</td>
                    <td class="px-4 py-5 border-l border-slate-100 bg-slate-50/50 text-[11px] text-slate-700 space-y-1">
                        <div><span class="font-bold text-blue-500 uppercase">NGR:</span> ${s.actuals.ngr}</div>
                        <div><span class="font-bold text-slate-400 uppercase">FCF:</span> ${s.actuals.fcf}</div>
                    </td>
                    <td class="px-4 py-5 text-[10px] text-slate-400 uppercase font-bold whitespace-normal min-w-[120px]">
                        ${s.jurisdictions.slice(0, 3).join(' • ')}
                    </td>
                `;
                tbody.appendChild(tr);

                // 2. MOBILE CARD
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-md border border-slate-200 active:scale-[0.98] transition-transform";
                card.onclick = () => openModal(s.ticker);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-slate-900 text-lg">${s.company}</h3>
                            <span class="text-[10px] font-mono text-slate-400">${s.ticker} • ${s.base_country}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black ${s.sentiment > 50 ? 'text-green-500' : 'text-slate-700'}">${s.sentiment}</div>
                            <div class="text-[8px] uppercase font-bold text-slate-400 tracking-tighter">AI Sentiment</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4 border-y border-slate-50 py-4">
                        <div>
                            <div class="text-[9px] uppercase font-bold text-slate-400 mb-1">EPS vs Forecast</div>
                            <div class="font-mono font-bold text-sm">${s.actuals.eps_actual} <span class="text-slate-300">/ ${s.actuals.eps_forecast}</span></div>
                            ${beatHtml}
                        </div>
                        <div>
                            <div class="text-[9px] uppercase font-bold text-slate-400 mb-1">Next Earnings</div>
                            <div class="font-bold text-sm text-blue-600">${dateStr} 2026</div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center text-[11px]">
                        <div class="space-y-1">
                            <div><span class="text-slate-400">Rev:</span> <span class="font-bold">${s.actuals.revenue}</span></div>
                            <div><span class="text-slate-400">Net:</span> <span class="font-bold ${s.actuals.net_income.includes('-') ? 'text-red-500' : ''}">${s.actuals.net_income}</span></div>
                        </div>
                        <div id="spark-mobile-${s.ticker}" class="sparkline-container"></div>
                    </div>
                `;
                mobileList.appendChild(card);

                // Initialize Sparklines
                renderSparkline(s, `#spark-${s.ticker}`);
                renderSparkline(s, `#spark-mobile-${s.ticker}`);
            });
        }

        function renderSparkline(s, selector) {
            if(!s.history["1w"] || !document.querySelector(selector)) return;
            new ApexCharts(document.querySelector(selector), {
                series: [{ data: s.history["1w"].map(p => p[1]) }],
                chart: { type: 'line', sparkline: { enabled: true }, animations: { enabled: false } },
                stroke: { curve: 'smooth', width: 2, colors: [s.sentiment > 50 ? '#22c55e' : '#64748b'] },
                tooltip: { enabled: false }
            }).render();
        }

        function openModal(ticker) {
            activeTicker = ticker;
            const s = db.find(x => x.ticker === ticker);
            document.getElementById('m-name').innerText = s.company;
            document.getElementById('m-ticker').innerText = `${s.ticker} | ${s.base_country}`;
            document.getElementById('m-sentiment-val').innerText = s.sentiment;
            document.getElementById('m-news').innerHTML = s.news_summary.map(n => `<div class="bg-white/10 p-4 rounded-xl border border-white/10">${n}</div>`).join('');
            document.body.classList.add('modal-open');
            document.getElementById('modal').classList.remove('hidden');
            
            setTimeout(() => { 
                updateMainChart(); 
                renderMap(s.jurisdictions); 
            }, 100);
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            document.body.classList.remove('modal-open');
        }

        function updateMainChart() {
            const timeframe = document.getElementById('timeframe-select').value;
            const s = db.find(x => x.ticker === activeTicker);
            if (chartInstance) chartInstance.destroy();
            chartInstance = new ApexCharts(document.querySelector("#main-chart"), {
                series: [{ name: 'Price', data: s.history[timeframe] }],
                chart: { 
                    type: 'area', 
                    height: window.innerWidth < 768 ? 250 : 350, 
                    toolbar: { show: false },
                    zoom: { enabled: false }
                },
                dataLabels: { enabled: false }, 
                stroke: { curve: 'smooth', width: 2 },
                xaxis: { type: 'datetime', labels: { style: { fontSize: '10px' } } },
                yaxis: { labels: { style: { fontSize: '10px' } } },
                colors: ['#2563eb'],
                fill: { type: 'gradient', gradient: { opacityFrom: 0.6, opacityTo: 0.1 } }
            });
            chartInstance.render();
        }

        function renderMap(list) {
            $('#m-map').empty();
            const markers = {};
            list.forEach(c => markers[c.substring(0, 2).toUpperCase()] = 1); 
            $('#m-map').vectorMap({
                map: 'world_mill_en', 
                backgroundColor: 'transparent',
                zoomOnScroll: false,
                regionStyle: { initial: { fill: '#cbd5e1' } },
                series: { regions: [{ values: markers, scale: ['#93c5fd', '#2563eb'] }] }
            });
        }

        init();
    </script>
</body>
</html>
