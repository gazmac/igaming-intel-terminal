<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Earnings HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sentiment-bar { height: 6px; border-radius: 3px; background: #e2e8f0; position: relative; }
        .sentiment-fill { height: 100%; border-radius: 3px; transition: width 1s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">iGaming Earnings HQ</h1>
                <p class="text-slate-500">Live Financial Intelligence & Market Sentiment</p>
            </div>
            <div id="last-update" class="text-xs text-slate-400 font-mono"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="stock-grid">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-5xl max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
                <div>
                    <h2 id="modal-title" class="text-2xl font-bold text-slate-900"></h2>
                    <p id="modal-ticker" class="text-slate-500 font-mono text-sm"></p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Market Performance</h3>
                            <select id="timeframe-select" onchange="updateMainChart()" class="text-sm border-slate-200 rounded-md bg-slate-50 px-2 py-1 outline-none">
                                <option value="1d">1 Day</option>
                                <option value="1w">1 Week</option>
                                <option value="1m">1 Month</option>
                                <option value="6m" selected>6 Months</option>
                                <option value="1y">1 Year</option>
                                <option value="5y">5 Years</option>
                            </select>
                        </div>
                        <div id="main-chart" class="w-full bg-slate-50 rounded-xl p-4"></div>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3">AI Sentiment</h3>
                            <div class="bg-slate-50 p-4 rounded-xl">
                                <div class="flex justify-between items-end mb-2">
                                    <span id="sentiment-label" class="text-2xl font-bold"></span>
                                    <span class="text-xs text-slate-400 pb-1">BULLISHNESS</span>
                                </div>
                                <div class="sentiment-bar"><div id="modal-sentiment-fill" class="sentiment-fill"></div></div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3">Core News Summary</h3>
                            <ul id="news-summary" class="space-y-3 text-sm text-slate-600 leading-relaxed"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        let activeTicker = null;
        let chartInstance = null;

        async function init() {
            try {
                const response = await fetch('gambling_stocks_live.json?v=' + Date.now());
                db = await response.json();
                document.getElementById('last-update').innerText = 'LAST REFRESH: ' + new Date().toLocaleTimeString();
                renderGrid();
            } catch (e) { console.error("Data load failed", e); }
        }

        function renderGrid() {
            const grid = document.getElementById('stock-grid');
            grid.innerHTML = db.map(s => {
                const color = s.sentiment > 60 ? 'bg-emerald-500' : (s.sentiment < 40 ? 'bg-rose-500' : 'bg-amber-500');
                return `
                    <div onclick="openModal('${s.ticker}')" class="bg-white p-5 rounded-2xl border border-slate-200 hover:border-blue-400 hover:shadow-xl transition-all cursor-pointer group">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-slate-900 group-hover:text-blue-600 transition-colors">${s.company}</h3>
                                <p class="text-xs font-mono text-slate-400">${s.ticker}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-lg font-bold text-slate-900">${s.last_price}</div>
                                <div class="text-[10px] text-slate-400 uppercase tracking-tighter">${s.base_country}</div>
                            </div>
                        </div>
                        <div class="sentiment-bar mb-2"><div class="sentiment-fill ${color}" style="width: ${s.sentiment}%"></div></div>
                        <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
                            <span>Sentiment</span>
                            <span>${s.sentiment}%</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(ticker) {
            activeTicker = ticker;
            const s = db.find(x => x.ticker === ticker);
            document.getElementById('modal-title').innerText = s.company;
            document.getElementById('modal-ticker').innerText = `${ticker} | ${s.base_country} Based`;
            
            const newsHtml = s.news_summary.map(item => `<li class="flex gap-2"><span class="text-blue-500">•</span>${item}</li>`).join('');
            document.getElementById('news-summary').innerHTML = newsHtml;
            
            const sentLabel = document.getElementById('sentiment-label');
            sentLabel.innerText = s.sentiment + '%';
            sentLabel.className = 'text-2xl font-bold ' + (s.sentiment > 60 ? 'text-emerald-600' : (s.sentiment < 40 ? 'text-rose-600' : 'text-amber-600'));
            
            const sentFill = document.getElementById('modal-sentiment-fill');
            sentFill.style.width = s.sentiment + '%';
            sentFill.className = 'sentiment-fill ' + (s.sentiment > 60 ? 'bg-emerald-500' : (s.sentiment < 40 ? 'bg-rose-500' : 'bg-amber-500'));

            document.getElementById('modal').classList.remove('hidden');
            updateMainChart();
        }

        function updateMainChart() {
            const timeframe = document.getElementById('timeframe-select').value;
            const s = db.find(x => x.ticker === activeTicker);
            if (chartInstance) chartInstance.destroy();
            
            const chartData = (s.history && s.history[timeframe]) ? s.history[timeframe] : [];
            
            chartInstance = new ApexCharts(document.querySelector("#main-chart"), {
                series: [{ name: 'Price', data: chartData }],
                chart: { 
                    type: 'area', 
                    height: 320, 
                    toolbar: { show: false },
                    zoom: { enabled: false }
                },
                // FIX: Hide labels and markers, keep tooltip
                dataLabels: { enabled: false },
                markers: { size: 0, hover: { size: 6 } },
                stroke: { curve: 'smooth', width: 2.5 },
                xaxis: { type: 'datetime', labels: { style: { colors: '#94a3b8' } } },
                yaxis: { labels: { style: { colors: '#94a3b8' }, formatter: (v) => v.toFixed(2) } },
                colors: ['#3b82f6'],
                fill: { type: 'gradient', gradient: { opacityFrom: 0.3, opacityTo: 0 } },
                grid: { borderColor: '#f1f5f9' },
                tooltip: { x: { format: 'dd MMM yyyy' }, theme: 'light' }
            });
            chartInstance.render();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
