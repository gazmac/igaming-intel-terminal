<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Intel Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.css">
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/tests/assets/jquery-jvectormap-world-mill-en.js"></script>
    <style>
        .sparkline-container { width: 80px; height: 30px; }
        #main-chart { min-height: 300px; }
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 p-3 md:p-6 font-sans text-slate-900">

    <div class="max-w-[120rem] mx-auto">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end border-b border-slate-200 pb-4 gap-2">
            <h1 class="text-2xl md:text-3xl font-black text-slate-800">iGaming Intel <span class="text-blue-600">Terminal</span></h1>
            <div id="last-update" class="text-[10px] text-slate-400 font-mono uppercase tracking-widest">Loading...</div>
        </header>

        <div class="hidden md:block bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <table class="min-w-full text-left whitespace-nowrap">
                <thead class="bg-slate-800 text-slate-300 text-[10px] uppercase font-bold tracking-wider">
                    <tr>
                        <th class="px-4 py-3">Equity & Price</th>
                        <th class="px-4 py-3">Sentiment</th>
                        <th class="px-4 py-3">Next Earnings</th>
                        <th class="px-4 py-3 border-l border-slate-600">EPS (Act vs Est)</th>
                        <th class="px-4 py-3">Rev / EBITDA</th>
                        <th class="px-4 py-3">Net Income</th>
                        <th class="px-4 py-3">Jurisdictions</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <div id="mobile-list" class="md:hidden space-y-4"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden flex items-center justify-center z-50 p-0 md:p-4">
        <div class="bg-white w-full h-full md:h-auto md:max-w-7xl md:rounded-3xl md:max-h-[95vh] overflow-y-auto relative p-6 md:p-10">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 text-4xl">&times;</button>
            <div class="flex flex-col md:flex-row justify-between mb-6 gap-4">
                <div><h2 id="m-name" class="text-2xl font-black"></h2><p id="m-ticker" class="text-slate-500 font-mono"></p></div>
                <select id="timeframe-select" onchange="updateMainChart()" class="bg-slate-100 rounded-xl px-4 py-2 font-bold outline-none">
                    <option value="1w">1 Week</option><option value="1m">1 Month</option><option value="1y">1 Year</option><option value="5y" selected>5 Years</option>
                </select>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div id="main-chart" class="bg-slate-50 rounded-2xl border p-4"></div>
                    <div id="m-map" class="h-48 bg-slate-50 rounded-2xl border overflow-hidden"></div>
                </div>
                <div class="bg-blue-600 rounded-2xl p-6 text-white">
                    <div class="text-5xl font-black mb-6" id="m-sentiment-val"></div>
                    <div id="m-news" class="text-sm space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        let activeTicker = null;
        let chartInstance = null;

        async function init() {
            const res = await fetch(`gambling_stocks_live.json?t=${Date.now()}`);
            db = await res.json();
            document.getElementById('last-update').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
            renderUI();
        }

        function renderUI() {
            const tbody = document.getElementById('table-body');
            const mobileList = document.getElementById('mobile-list');
            tbody.innerHTML = ''; mobileList.innerHTML = '';
            
            db.forEach(s => {
                const isBeat = s.eps_beat_miss_pct > 0;
                const beatHtml = `<div class="${isBeat ? 'text-green-600' : 'text-red-500'} font-black text-[10px] mt-1">${isBeat ? '▲ BEAT' : '▼ MISS'} ${Math.abs(s.eps_beat_miss_pct)}%</div>`;

                // Desktop
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 cursor-pointer border-b border-slate-50 transition-colors";
                tr.onclick = () => openModal(s.ticker);
                tr.innerHTML = `
                    <td class="px-4 py-5">
                        <div class="font-black text-slate-800 flex items-center gap-2">${s.company} <span class="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md font-bold">${s.last_price}</span></div>
                        <div class="text-[10px] text-slate-400 font-mono">${s.ticker}</div>
                    </td>
                    <td class="px-4 py-5"><div class="flex items-center gap-3"><span class="font-black ${s.sentiment > 50 ? 'text-green-500' : 'text-slate-700'}">${s.sentiment}</span><div id="spark-${s.ticker}" class="sparkline-container"></div></div></td>
                    <td class="px-4 py-5 font-bold text-sm">${new Date(s.release_gmt).toLocaleDateString('en-GB', {day:'2-digit', month:'short'})}</td>
                    <td class="px-4 py-4 border-l bg-slate-50/50">
                        <div class="text-[11px] font-bold"><span class="text-slate-400">ACT:</span> ${s.actuals.eps_actual}</div>
                        <div class="text-[11px] font-bold"><span class="text-slate-400">EST:</span> ${s.actuals.eps_forecast}</div>
                        ${beatHtml}
                    </td>
                    <td class="px-4 py-5 text-[11px] space-y-1">
                        <div><span class="text-slate-400 font-bold">REV:</span> ${s.actuals.revenue}</div>
                        <div><span class="text-slate-400 font-bold">EBT:</span> ${s.actuals.ebitda}</div>
                    </td>
                    <td class="px-4 py-5 font-bold text-sm ${s.actuals.net_income.includes('-') ? 'text-red-500' : ''}">${s.actuals.net_income}</td>
                    <td class="px-4 py-5 text-[10px] text-slate-400 font-bold uppercase">${s.jurisdictions.slice(0,2).join(' • ')}</td>
                `;
                tbody.appendChild(tr);

                // Mobile
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl border border-slate-200 active:scale-95 transition-transform";
                card.onclick = () => openModal(s.ticker);
                card.innerHTML = `<div class="flex justify-between font-black"><div>${s.company} <span class="text-blue-600 text-xs ml-2">${s.last_price}</span></div><div class="${s.sentiment > 50 ? 'text-green-500' : ''}">${s.sentiment}</div></div>`;
                mobileList.appendChild(card);

                renderSparkline(s, `#spark-${s.ticker}`);
            });
        }

        function renderSparkline(s, selector) {
            if(!s.history["1w"]) return;
            new ApexCharts(document.querySelector(selector), {
                series: [{ data: s.history["1w"].map(p => p[1]) }],
                chart: { type: 'line', sparkline: { enabled: true } },
                stroke: { curve: 'smooth', width: 2, colors: [s.sentiment > 50 ? '#22c55e' : '#64748b'] }
            }).render();
        }

        function openModal(ticker) {
            activeTicker = ticker;
            const s = db.find(x => x.ticker === ticker);
            document.getElementById('m-name').innerText = s.company;
            document.getElementById('m-ticker').innerText = `${s.ticker} | ${s.last_price}`;
            document.getElementById('m-sentiment-val').innerText = s.sentiment;
            document.getElementById('m-news').innerHTML = s.news_summary.map(n => `<div class="bg-white/10 p-3 rounded-lg">${n}</div>`).join('');
            document.getElementById('modal').classList.remove('hidden');
            document.body.classList.add('modal-open');
            setTimeout(() => { updateMainChart(); renderMap(s.jurisdictions); }, 100);
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.body.classList.remove('modal-open'); }

        function updateMainChart() {
            const timeframe = document.getElementById('timeframe-select').value;
            const s = db.find(x => x.ticker === activeTicker);
            if (chartInstance) chartInstance.destroy();
            chartInstance = new ApexCharts(document.querySelector("#main-chart"), {
                series: [{ name: 'Price', data: s.history[timeframe] }],
                chart: { type: 'area', height: 300, toolbar: { show: false } },
                xaxis: { type: 'datetime' },
                colors: ['#2563eb'],
                fill: { type: 'gradient', gradient: { opacityFrom: 0.4, opacityTo: 0 } },
                noData: { text: 'Loading...' }
            });
            chartInstance.render();
        }

        function renderMap(list) {
            $('#m-map').empty();
            const markers = {}; list.forEach(c => markers[c.substring(0, 2).toUpperCase()] = 1);
            $('#m-map').vectorMap({
                map: 'world_mill_en', backgroundColor: 'transparent',
                regionStyle: { initial: { fill: '#cbd5e1' } },
                series: { regions: [{ values: markers, scale: ['#93c5fd', '#2563eb'] }] }
            });
        }

        init();
    </script>
</body>
</html>
