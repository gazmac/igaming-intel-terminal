<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Intelligence Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.css">
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/tests/assets/jquery-jvectormap-world-mill-en.js"></script>
    <style>
        .sparkline-container { width: 80px; height: 30px; }
        @media (min-width: 768px) { .sparkline-container { width: 100px; height: 35px; } }
        #main-chart { min-height: 300px; }
        /* Prevent body scroll when modal is open on mobile */
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 p-3 md:p-6 font-sans text-slate-900">

    <div class="max-w-[120rem] mx-auto">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end border-b border-slate-200 pb-4 gap-2">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-800">iGaming Intel <span class="text-blue-600">Terminal</span></h1>
            </div>
            <div id="last-update" class="text-[10px] md:text-xs text-slate-400 font-mono uppercase tracking-widest">Loading Data...</div>
        </header>

        <div class="hidden md:block bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <table class="min-w-full text-left whitespace-nowrap">
                <thead class="bg-slate-800 text-slate-300 text-[10px] uppercase font-bold tracking-wider">
                    <tr>
                        <th class="px-4 py-3">Equity</th>
                        <th class="px-4 py-3">Sentiment & Trend</th>
                        <th class="px-4 py-3">Next Earnings</th>
                        <th class="px-4 py-3 border-l border-slate-600">EPS (Actual vs Est)</th>
                        <th class="px-4 py-3">Rev / EBITDA</th>
                        <th class="px-4 py-3">Net Income</th>
                        <th class="px-4 py-3 border-l border-slate-600">NGR & FCF</th>
                        <th class="px-4 py-3">Jurisdictions</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <div id="mobile-list" class="md:hidden space-y-4">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden flex items-center justify-center z-50 p-0 md:p-4">
        <div class="bg-white w-full h-full md:h-auto md:max-w-7xl md:rounded-3xl md:max-h-[95vh] overflow-y-auto relative p-6 md:p-10 shadow-2xl">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-900 text-4xl md:text-3xl z-50">&times;</button>
            
            <div class="flex flex-col md:flex-row justify-between items-start mb-6 mt-4 md:mt-0 gap-4">
                <div>
                    <h2 id="m-name" class="text-2xl md:text-3xl font-black text-slate-900"></h2>
                    <p id="m-ticker" class="text-slate-500 font-mono text-sm"></p>
                </div>
                <select id="timeframe-select" onchange="updateMainChart()" class="w-full md:w-auto bg-slate-100 border-none text-sm font-bold rounded-xl px-4 py-3 md:py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="1w">1 Week</option>
                    <option value="1m">1 Month</option>
                    <option value="6m">6 Months</option>
                    <option value="1y">1 Year</option>
                    <option value="5y" selected>5 Years</option>
                </select>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                <div class="lg:col-span-2 space-y-4 md:space-y-6">
                    <div class="w-full bg-slate-50 rounded-2xl border border-slate-200 p-2 md:p-4">
                        <div id="main-chart"></div>
                    </div>
                    <div class="h-48 md:h-64 bg-slate-50 rounded-2xl border border-slate-200 overflow-hidden relative">
                        <div id="m-map" class="absolute inset-0"></div>
                    </div>
                </div>
                
                <div class="bg-blue-600 rounded-2xl p-6 md:p-8 text-white shadow-lg shadow-blue-200 flex flex-col h-full">
                    <h3 class="text-[10px] font-black uppercase opacity-70 mb-4 tracking-widest">AI Sentiment Engine</h3>
                    <div class="text-5xl md:text-6xl font-black mb-6" id="m-sentiment-val"></div>
                    <div class="space-y-4 flex-grow overflow-y-auto">
                        <h4 class="text-xs font-bold uppercase opacity-70 border-b border-white/20 pb-2">Strategic Summary</h4>
                        <div id="m-news" class="text-sm md:text-base space-y-4 opacity-95 leading-relaxed"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        let activeTicker = null;
        let chartInstance = null;

        async function init() {
            try {
                // Cache Buster to ensure fresh data load
                const cacheBuster = new Date().getTime();
                const res = await fetch(`gambling_stocks_live.json?t=${cacheBuster}`);
                db = await res.json();
                document.getElementById('last-update').innerText = `Refreshed: ${new Date().toLocaleTimeString()}`;
                renderUI();
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('last-update').innerText = "Data fetch failed. Retrying...";
            }
        }

        function renderUI() {
            const tbody = document.getElementById('table-body');
            const mobileList = document.getElementById('mobile-list');
            tbody.innerHTML = '';
            mobileList.innerHTML = '';
            
            db.forEach(s => {
                // Date Formatting
                const dateObj = new Date(s.release_gmt);
                const dateStr = !isNaN(dateObj) ? dateObj.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) : 'Pending';
                
                // Safe EPS Parsing
                const actEps = (s.actuals && s.actuals.eps_actual !== null) ? s.actuals.eps_actual : 'N/A';
                const estEps = (s.actuals && s.actuals.eps_forecast !== null) ? s.actuals.eps_forecast : 'N/A';

                // Beat/Miss Logic
                let beatHtml = '';
                if (s.eps_beat_miss_pct !== null && s.eps_beat_miss_pct !== undefined) {
                    const isBeat = s.eps_beat_miss_pct > 0;
                    beatHtml = `<div class="${isBeat ? 'text-green-600' : 'text-red-500'} font-black text-[10px] mt-1 tracking-wider">${isBeat ? '▲ BEAT' : '▼ MISS'} ${Math.abs(s.eps_beat_miss_pct)}%</div>`;
                } else {
                    beatHtml = `<div class="text-slate-400 font-bold text-[10px] mt-1">N/A</div>`;
                }

                // Default Fallbacks for missing financials
                const rev = s.actuals?.revenue || 'N/A';
                const ebitda = s.actuals?.ebitda || 'N/A';
                const netInc = s.actuals?.net_income || 'N/A';
                const ngr = s.actuals?.ngr || 'N/A';
                const fcf = s.actuals?.fcf || 'N/A';
                const jurisdictions = s.jurisdictions && s.jurisdictions.length > 0 ? s.jurisdictions : ['Data unavailable'];

                // 1. DESKTOP ROW
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 cursor-pointer border-b border-slate-50 transition-colors";
                tr.onclick = () => openModal(s.ticker);
                tr.innerHTML = `
                    <td class="px-4 py-5"><div class="font-black text-slate-800 text-base">${s.company}</div><div class="text-[10px] text-slate-500 font-mono">${s.ticker}</div></td>
                    <td class="px-4 py-5"><div class="flex items-center gap-4"><span class="text-lg font-black ${s.sentiment > 50 ? 'text-green-500' : 'text-slate-700'}">${s.sentiment || 50}</span><div id="spark-${s.ticker}" class="sparkline-container"></div></div></td>
                    <td class="px-4 py-5 font-bold text-slate-800">${dateStr}</td>
                    <td class="px-4 py-4 border-l border-slate-100 bg-slate-50/50">
                        <div class="flex flex-col space-y-1">
                            <div class="text-[11px] font-bold text-slate-800"><span class="text-slate-400 uppercase mr-1">Act:</span>${actEps}</div>
                            <div class="text-[11px] font-bold text-slate-800"><span class="text-slate-400 uppercase mr-1">Est:</span>${estEps}</div>
                        </div>
                        <div class="mt-2 pt-2 border-t border-slate-200">
                            ${beatHtml}
                        </div>
                    </td>
                    <td class="px-4 py-5 text-[11px] text-slate-700 space-y-1">
                        <div><span class="font-bold text-slate-400 uppercase">Rev:</span> ${rev}</div>
                        <div><span class="font-bold text-slate-400 uppercase">EBT:</span> ${ebitda}</div>
                    </td>
                    <td class="px-4 py-5 font-bold text-sm ${netInc.includes('-') ? 'text-red-600' : 'text-slate-800'}">${netInc}</td>
                    <td class="px-4 py-5 border-l border-slate-100 bg-slate-50/50 text-[11px] text-slate-700 space-y-1">
                        <div><span class="font-bold text-blue-500 uppercase">NGR:</span> ${ngr}</div>
                        <div><span class="font-bold text-slate-400 uppercase">FCF:</span> ${fcf}</div>
                    </td>
                    <td class="px-4 py-5 text-[10px] text-slate-400 uppercase font-bold whitespace-normal min-w-[120px] leading-relaxed">
                        ${jurisdictions.slice(0, 3).join(' • ')} ${jurisdictions.length > 3 ? '...' : ''}
                    </td>
                `;
                tbody.appendChild(tr);

                // 2. MOBILE CARD
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-200 active:scale-[0.98] transition-transform";
                card.onclick = () => openModal(s.ticker);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-slate-900 text-lg">${s.company}</h3>
                            <span class="text-[10px] font-mono text-slate-400">${s.ticker} • ${s.base_country}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black ${s.sentiment > 50 ? 'text-green-500' : 'text-slate-700'}">${s.sentiment || 50}</div>
                            <div class="text-[8px] uppercase font-bold text-slate-400 tracking-tighter">AI Sentiment</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4 border-y border-slate-100 py-4">
                        <div>
                            <div class="text-[9px] uppercase font-bold text-slate-400 mb-2">EPS (Act vs Est)</div>
                            <div class="text-xs font-bold text-slate-800 mb-1"><span class="text-slate-400 font-normal mr-1">A:</span>${actEps}</div>
                            <div class="text-xs font-bold text-slate-800"><span class="text-slate-400 font-normal mr-1">E:</span>${estEps}</div>
                            ${beatHtml}
                        </div>
                        <div>
                            <div class="text-[9px] uppercase font-bold text-slate-400 mb-1">Next Earnings</div>
                            <div class="font-bold text-sm text-blue-600">${dateStr}</div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center text-[11px]">
                        <div class="space-y-1">
                            <div><span class="text-slate-400 font-bold uppercase">Rev:</span> <span class="font-bold">${rev}</span></div>
                            <div><span class="text-slate-400 font-bold uppercase">Net:</span> <span class="font-bold ${netInc.includes('-') ? 'text-red-500' : ''}">${netInc}</span></div>
                        </div>
                        <div id="spark-mobile-${s.ticker}" class="sparkline-container"></div>
                    </div>
                `;
                mobileList.appendChild(card);

                // Initialize Sparklines securely
                if(s.history && s.history["1w"] && s.history["1w"].length > 0) {
                    renderSparkline(s, `#spark-${s.ticker}`);
                    renderSparkline(s, `#spark-mobile-${s.ticker}`);
                }
            });
        }

        function renderSparkline(s, selector) {
            const el = document.querySelector(selector);
            if(!el) return;
            
            new ApexCharts(el, {
                series: [{ data: s.history["1w"].map(p => p[1]) }],
                chart: { type: 'line', sparkline: { enabled: true }, animations: { enabled: false } },
                stroke: { curve: 'smooth', width: 2, colors: [s.sentiment > 50 ? '#22c55e' : '#64748b'] },
                tooltip: { enabled: false }
            }).render();
        }

        function openModal(ticker) {
            activeTicker = ticker;
            const s = db.find(x => x.ticker === ticker);
            if(!s) return;

            document.getElementById('m-name').innerText = s.company;
            document.getElementById('m-ticker').innerText = `${s.ticker} | HQ: ${s.base_country}`;
            document.getElementById('m-sentiment-val').innerText = s.sentiment || 50;
            
            const newsHtml = (s.news_summary && s.news_summary.length > 0) 
                ? s.news_summary.map(n => `<div class="bg-white/10 p-4 rounded-xl border border-white/10">${n}</div>`).join('')
                : '<p>No recent news available.</p>';
            document.getElementById('m-news').innerHTML = newsHtml;
            
            document.body.classList.add('modal-open');
            document.getElementById('modal').classList.remove('hidden');
            
            // Render charts after modal transition
            setTimeout(() => { 
                updateMainChart(); 
                renderMap(s.jurisdictions || []); 
            }, 100);
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            document.body.classList.remove('modal-open');
        }

        function updateMainChart() {
            const timeframe = document.getElementById('timeframe-select').value;
            const s = db.find(x => x.ticker === activeTicker);
            
            if (chartInstance) chartInstance.destroy();
            
            const chartData = (s.history && s.history[timeframe]) ? s.history[timeframe] : [];
            
            chartInstance = new ApexCharts(document.querySelector("#main-chart"), {
                series: [{ name: 'Price', data: chartData }],
                chart: { 
                    type: 'area', 
                    height: window.innerWidth < 768 ? 250 : 320, 
                    toolbar: { show: false },
                    zoom: { enabled: false },
                    fontFamily: 'inherit'
                },
                dataLabels: { enabled: false }, 
                stroke: { curve: 'smooth', width: 2 },
                xaxis: { 
                    type: 'datetime', 
                    labels: { style: { colors: '#64748b', fontSize: '10px' } },
                    axisBorder: { show: false },
                    axisTicks: { show: false }
                },
                yaxis: { 
                    labels: { 
                        style: { colors: '#64748b', fontSize: '10px' },
                        formatter: (val) => val ? val.toFixed(2) : ''
                    } 
                },
                grid: { borderColor: '#f1f5f9', strokeDashArray: 4 },
                colors: ['#2563eb'],
                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0 } },
                noData: { text: 'Loading chart data...', align: 'center', verticalAlign: 'middle' }
            });
            chartInstance.render();
        }

        function renderMap(list) {
            $('#m-map').empty();
            const markers = {};
            // Simplified mapping: grab first 2 letters of jurisdiction (e.g., "US", "UK")
            list.forEach(c => {
                let code = c.substring(0, 2).toUpperCase();
                if(code === 'UK') code = 'GB'; // JVectorMap uses GB for UK
                markers[code] = 1;
            }); 
            
            $('#m-map').vectorMap({
                map: 'world_mill_en', 
                backgroundColor: 'transparent',
                zoomOnScroll: false,
                regionStyle: { 
                    initial: { fill: '#cbd5e1', stroke: 'none' },
                    hover: { "fill-opacity": 0.8, cursor: 'default' }
                },
                series: { 
                    regions: [{ values: markers, scale: ['#93c5fd', '#2563eb'] }] 
                }
            });
        }

        // Close modal when clicking outside the content box
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        init();
    </script>
</body>
</html>
