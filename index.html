<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Earnings HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.css">
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/tests/assets/jquery-jvectormap-world-mill-en.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sentiment-bar { height: 6px; border-radius: 3px; background: #e2e8f0; position: relative; }
        .sentiment-fill { height: 100%; border-radius: 3px; transition: width 1s ease-in-out; }
        #methodology-overlay { transition: opacity 0.3s ease; }
        
        .reading-room-prose p { margin-bottom: 1.2em; font-size: 0.95rem; line-height: 1.6; color: #334155; }
        .reading-room-prose strong { color: #0f172a; font-weight: 700; }
        .reading-room-prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1.2em; }
        .reading-room-prose li { margin-bottom: 0.5em; font-size: 0.95rem; color: #334155; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b border-slate-200 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">iGaming Earnings HQ</h1>
                <p class="text-slate-500">Live Financial Intelligence & Market Sentiment</p>
            </div>
            <div class="flex flex-col items-start md:items-end gap-3 w-full md:w-auto">
                <div id="last-update" class="text-[10px] text-slate-400 font-mono tracking-widest uppercase bg-slate-100 px-2 py-1 rounded">Loading Data...</div>
                
                <div class="flex items-center gap-2 w-full">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider hidden sm:inline">Sort By:</span>
                    <select id="sort-select" onchange="applySort()" class="bg-white border border-slate-200 text-sm rounded-lg px-4 py-2 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm w-full md:w-auto cursor-pointer">
                        <option value="earnings">Nearest Earnings Date</option>
                        <option value="marketcap">Market Cap (High to Low)</option>
                        <option value="beat">Highest EPS Beat</option>
                        <option value="exchange">Stock Exchange Group</option>
                        <option value="alpha">Alphabetical</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="stock-grid"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-40 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-6xl max-h-[95vh] overflow-y-auto shadow-2xl relative">
            
            <div class="p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
                <div class="flex items-center gap-4">
                    <img id="modal-logo" src="" alt="" class="w-12 h-12 rounded-full border border-slate-200 bg-white object-contain p-1 hidden">
                    <div>
                        <h2 id="modal-title" class="text-2xl font-bold text-slate-900"></h2>
                        <div id="modal-ticker" class="mt-1"></div>
                    </div>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6">
                <div id="modal-financials" class="flex flex-wrap gap-4 mb-6 p-4 bg-slate-50 rounded-xl border border-slate-100 justify-between items-center shadow-sm"></div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8" id="modal-main-content">
                    
                    <div class="lg:col-span-2 flex flex-col gap-6">
                        <div class="bg-white border border-slate-100 shadow-sm rounded-xl p-2">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-3 px-2 pt-2">
                                <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Market Performance</h3>
                                <div class="flex gap-2 w-full sm:w-auto">
                                    <select id="compare-select" onchange="updateMainChart()" class="text-sm border-slate-200 rounded-md bg-slate-50 px-2 py-1 outline-none font-semibold text-purple-600 w-full sm:w-auto cursor-pointer"><option value="">Compare...</option></select>
                                    <select id="timeframe-select" onchange="updateMainChart()" class="text-sm border-slate-200 rounded-md bg-slate-50 px-2 py-1 outline-none font-semibold text-slate-700 cursor-pointer">
                                        <option value="1d">1 Day</option><option value="1w">1 Week</option><option value="1m">1 Month</option><option value="6m" selected>6 Months</option><option value="1y">1 Year</option><option value="5y">5 Years</option>
                                    </select>
                                </div>
                            </div>
                            <div id="main-chart" class="w-full min-h-[300px]"></div>
                        </div>

                        <div class="bg-white border border-slate-100 shadow-sm rounded-xl p-4 flex flex-col h-[280px]">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Global Operational Footprint</h3>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" id="map-jurisdictions-text"></div>
                            </div>
                            <div class="relative flex-grow rounded-lg overflow-hidden bg-slate-50 border border-slate-100"><div id="m-map" class="absolute inset-0"></div></div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <span id="sentiment-label" class="text-2xl font-bold"></span>
                                <span class="text-xs text-slate-400 pb-1 uppercase font-bold tracking-tighter">Bullishness Index</span>
                            </div>
                            <div class="sentiment-bar mb-4"><div id="modal-sentiment-fill" class="sentiment-fill"></div></div>
                            
                            <button onclick="toggleReadingRoom()" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-md">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                Enter Earnings Reading Room
                            </button>
                        </div>

                        <div>
                            <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3">Core News Summary</h3>
                            <ul id="news-summary" class="space-y-3 text-sm text-slate-600 leading-relaxed bg-white p-4 rounded-xl border border-slate-100 shadow-sm"></ul>
                        </div>
                    </div>
                </div>
                
                <div id="modal-reading-room" class="hidden bg-white border border-slate-200 rounded-xl p-6 md:p-10 shadow-inner">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-slate-100 pb-4 gap-4">
                        <div>
                            <h3 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                Executive Analyst Briefing
                            </h3>
                            <p class="text-sm text-slate-400 mt-1">AI-Synthesized Strategic Outline</p>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="playReadingRoomAudio()" class="w-full md:w-auto text-sm font-bold text-slate-700 hover:text-slate-900 flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg transition-colors border border-slate-200 shadow-sm">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10.4 4.038a1 1 0 00-1.077.092l-3.8 2.87H4a2 2 0 00-2 2v2a2 2 0 002 2h1.523l3.8 2.87A1 1 0 0011 15V5a1 1 0 00-.6-.962zM14.5 10a4.5 4.5 0 00-1.84-3.61 1 1 0 111.18-1.61A6.5 6.5 0 0116.5 10a6.5 6.5 0 01-2.66 5.22 1 1 0 01-1.18-1.61A4.5 4.5 0 0014.5 10z"></path></svg>
                                <span id="tts-btn-text">Listen to Briefing</span>
                            </button>
                            <button onclick="toggleReadingRoom()" class="w-full md:w-auto text-sm font-bold text-blue-600 hover:text-blue-800 uppercase tracking-wider bg-blue-50 px-4 py-2 rounded-lg">Close Room [X]</button>
                        </div>
                    </div>
                    
                    <div class="max-w-3xl mx-auto">
                        <div id="management-quotes-container" class="mb-8 p-6 bg-slate-50 border-l-4 border-blue-500 rounded-r-xl">
                            <h4 class="text-xs font-bold uppercase tracking-widest text-blue-600 mb-4 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                From the Desk of Management
                            </h4>
                            <div id="management-quotes" class="space-y-4"></div>
                        </div>

                        <div id="reading-room-content" class="reading-room-prose"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let db = [];
        let activeTicker = null;
        let chartInstance = null;
        let currentSort = 'earnings';
        let currentSpeech = null;

        async function init() {
            try {
                const response = await fetch('gambling_stocks_live.json?v=' + Date.now());
                db = await response.json();
                document.getElementById('last-update').innerText = 'Last Sync: ' + new Date().toLocaleTimeString();
                applySort(); 
            } catch (e) { 
                document.getElementById('last-update').innerText = 'Data Fetch Failed';
            }
        }

        function playReadingRoomAudio() {
            if ('speechSynthesis' in window) {
                if (currentSpeech && window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel(); 
                    document.getElementById('tts-btn-text').innerText = "Listen to Briefing";
                    return;
                }

                const quotesText = document.getElementById('management-quotes').innerText;
                const briefingText = document.getElementById('reading-room-content').innerText;
                const fullText = "Key Management Quotes. " + quotesText + ". Executive Briefing. " + briefingText;

                currentSpeech = new SpeechSynthesisUtterance(fullText);
                currentSpeech.rate = 0.95; 
                currentSpeech.pitch = 1;
                
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(v => v.lang === 'en-US' || v.lang === 'en-GB');
                if (preferredVoice) currentSpeech.voice = preferredVoice;

                currentSpeech.onend = () => {
                    document.getElementById('tts-btn-text').innerText = "Listen to Briefing";
                };

                window.speechSynthesis.speak(currentSpeech);
                document.getElementById('tts-btn-text').innerText = "Stop Audio";
            } else {
                alert("Text-to-Speech is not natively supported in your browser.");
            }
        }

        function toggleReadingRoom() {
            const mainContent = document.getElementById('modal-main-content');
            const readingRoom = document.getElementById('modal-reading-room');
            
            if (readingRoom.classList.contains('hidden')) {
                mainContent.classList.add('hidden');
                readingRoom.classList.remove('hidden');
            } else {
                readingRoom.classList.add('hidden');
                mainContent.classList.remove('hidden');
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                document.getElementById('tts-btn-text').innerText = "Listen to Briefing";
            }
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            document.getElementById('tts-btn-text').innerText = "Listen to Briefing";
        }

        function getExchangeGroup(ticker) {
            if (ticker.endsWith('.L')) return 'LSE (UK)';
            if (ticker.endsWith('.ST')) return 'Nasdaq Stockholm';
            if (ticker.endsWith('.PA')) return 'Euronext Paris';
            if (ticker.endsWith('.AX')) return 'ASX (Australia)';
            return 'US Markets (NYSE/NASDAQ)';
        }

        function applySort() {
            currentSort = document.getElementById('sort-select').value;
            let sortedDb = [...db];
            sortedDb.sort((a, b) => {
                if (currentSort === 'earnings') {
                    const timeA = new Date(a.calendar?.date || '').getTime() || Infinity;
                    const timeB = new Date(b.calendar?.date || '').getTime() || Infinity;
                    return timeA - timeB;
                } 
                else if (currentSort === 'marketcap') {
                    return (b.market_cap_usd || 0) - (a.market_cap_usd || 0);
                }
                else if (currentSort === 'alpha') return a.company.localeCompare(b.company);
                else if (currentSort === 'exchange') {
                    const exA = getExchangeGroup(a.ticker); const exB = getExchangeGroup(b.ticker);
                    return exA === exB ? a.company.localeCompare(b.company) : exA.localeCompare(exB);
                } 
                else if (currentSort === 'beat') return (b.eps_beat_miss_pct || -999) - (a.eps_beat_miss_pct || -999);
                return 0;
            });
            renderGrid(sortedDb);
        }

        function renderGrid(dataToRender) {
            const grid = document.getElementById('stock-grid');
            grid.innerHTML = dataToRender.map(s => {
                const color = s.sentiment > 60 ? 'bg-emerald-500' : (s.sentiment < 40 ? 'bg-rose-500' : 'bg-amber-500');
                const locationLabel = currentSort === 'exchange' ? getExchangeGroup(s.ticker) : s.base_country;
                const revLabel = s.actuals?.rev_label || 'REV';
                const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.company)}&background=f1f5f9&color=475569&rounded=true`;

                return `
                    <div onclick="openModal('${s.ticker}')" class="bg-white p-5 rounded-2xl border border-slate-200 hover:border-blue-400 hover:shadow-xl transition-all cursor-pointer group flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex gap-3 items-center">
                                    <img src="${s.logo || fallbackUrl}" alt="${s.company} Logo" class="w-10 h-10 rounded-full border border-slate-200 bg-white object-contain p-0.5 shrink-0" onerror="this.onerror=null; this.src='${fallbackUrl}';">
                                    <div>
                                        <h3 class="font-bold text-slate-900 group-hover:text-blue-600 transition-colors">${s.company}</h3>
                                        <p class="text-[10px] font-mono text-slate-400 mt-0.5">${s.ticker} • ${locationLabel}</p>
                                        <span class="inline-block mt-1.5 bg-slate-100 text-slate-600 text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded">${s.focus || 'Diversified Gaming'}</span>
                                    </div>
                                </div>
                                <div class="text-right shrink-0"><div class="text-lg font-bold text-slate-900">${s.last_price || 'N/A'}</div></div>
                            </div>
                            
                            <div class="flex justify-between items-center text-[10px] mb-2 border-b border-slate-50 pb-2">
                                <span class="text-slate-400 font-bold uppercase tracking-wider">Mkt Cap:</span>
                                <span class="font-bold text-slate-700">${s.market_cap_str || 'N/A'}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-2 mb-3 text-[10px] bg-slate-50 p-2 rounded-lg border border-slate-100">
                                <div><span class="text-slate-400 font-bold uppercase">${revLabel}</span><br><span class="font-bold text-slate-800 text-xs">${s.actuals?.revenue_interim || 'N/A'}</span></div>
                                <div class="text-right"><span class="text-slate-400 font-bold uppercase">EPS BEAT/MISS</span><br><span class="font-bold text-xs ${s.eps_beat_miss_pct > 0 ? 'text-green-600':'text-red-500'}">${s.eps_beat_miss_pct || 0}%</span></div>
                            </div>
                        </div>
                        <div>
                            <div class="text-[10px] font-bold text-slate-500 flex justify-between items-center mb-3 pb-3 border-b border-slate-100"><span>🗓️ NEXT EARNINGS:</span><span class="text-blue-600">${s.calendar?.date || 'TBD'}</span></div>
                            <div class="sentiment-bar mb-2"><div class="sentiment-fill ${color}" style="width: ${s.sentiment || 50}%"></div></div>
                            <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase"><span>Sentiment</span><span>${s.sentiment || 50}%</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(ticker) {
            try {
                activeTicker = ticker;
                const s = db.find(x => x.ticker === ticker);
                
                // RESET VIEW EVERY TIME MODAL OPENS
                document.getElementById('modal-main-content').classList.remove('hidden');
                document.getElementById('modal-reading-room').classList.add('hidden');
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                document.getElementById('tts-btn-text').innerText = "Listen to Briefing";

                document.getElementById('compare-select').innerHTML = '<option value="">Compare...</option>' + db.filter(x => x.ticker !== ticker).sort((a,b)=>a.company.localeCompare(b.company)).map(x=>`<option value="${x.ticker}">${x.company}</option>`).join('');
                
                const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.company)}&background=f1f5f9&color=475569&rounded=true`;
                const modalLogo = document.getElementById('modal-logo');
                modalLogo.src = s.logo || fallbackUrl;
                modalLogo.onerror = function() { this.onerror = null; this.src = fallbackUrl; };
                modalLogo.classList.remove('hidden');

                document.getElementById('modal-title').innerText = s.company;
                document.getElementById('modal-ticker').innerHTML = `<span class="text-slate-500 font-mono text-sm">${ticker} | ${s.base_country} Based</span><span class="ml-3 inline-block bg-blue-100 text-blue-700 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded align-middle">${s.focus || 'Diversified Gaming'}</span>`;
                document.getElementById('modal-earnings-date').innerText = s.calendar?.date || 'TBD';
                document.getElementById('modal-report-time').innerText = s.calendar?.report_time || 'TBD';
                document.getElementById('modal-call-time').innerText = s.calendar?.call_time || 'TBD';
                
                const revLabel = s.actuals?.rev_label || 'Revenue';

                document.getElementById('modal-financials').innerHTML = `
                    <div class="min-w-[110px]"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Market Cap</div><div class="font-mono text-sm font-bold text-slate-800">${s.market_cap_str || 'N/A'}</div></div>
                    <div class="min-w-[80px]"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">P/E Ratio</div><div class="font-mono text-sm font-bold text-slate-800">${s.pe_ratio || 'N/A'}</div></div>
                    <div class="min-w-[80px]"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Debt/Eq</div><div class="font-mono text-sm font-bold text-slate-800">${s.debt_to_equity || 'N/A'}</div></div>
                    <div class="min-w-[100px]"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">EPS (Act/Est)</div><div class="font-mono text-sm font-bold">${s.actuals?.eps_actual || 'N/A'} <span class="text-slate-400">/ ${s.actuals?.eps_forecast || 'N/A'}</span></div></div>
                    <div class="min-w-[100px]"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${revLabel} (Interim)</div><div class="font-mono text-sm font-bold text-blue-600">${s.actuals?.revenue_interim || 'N/A'}</div></div>
                    <div class="min-w-[100px]"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${revLabel} (FY)</div><div class="font-mono text-sm font-bold text-blue-600">${s.actuals?.revenue_fy || 'N/A'}</div></div>
                    <div class="min-w-[80px]"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">EBITDA</div><div class="font-mono text-sm font-bold">${s.actuals?.ebitda || 'N/A'}</div></div>
                    <div class="min-w-[80px]"><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">FCF</div><div class="font-mono text-sm font-bold">${s.actuals?.fcf || 'N/A'}</div></div>
                `;

                // HIGHLY DEFENSIVE DATA PARSING FOR AI GENERATED CONTENT
                let newsArr = Array.isArray(s.news_summary) ? s.news_summary : [s.news_summary || 'No news available.'];
                document.getElementById('news-summary').innerHTML = newsArr.map(item => `<li class="flex gap-2"><span class="text-blue-500">•</span>${item}</li>`).join('');
                
                let quotesArr = Array.isArray(s.quotes) ? s.quotes : (typeof s.quotes === 'string' ? [s.quotes] : []);
                const quotesHtml = quotesArr.map(q => {
                    const safeStr = String(q).replace(/^["']|["']$/g, '').trim();
                    return `
                    <blockquote class="relative p-4 bg-white border border-slate-200 rounded-lg shadow-sm">
                        <div class="text-3xl text-blue-200 absolute top-1 left-2 font-serif">"</div>
                        <p class="text-sm font-medium text-slate-700 italic relative z-10 pl-5">${safeStr}</p>
                    </blockquote>`;
                }).join('');
                document.getElementById('management-quotes').innerHTML = quotesHtml || '<p class="text-sm text-slate-500 italic">No direct management quotes currently available.</p>';

                document.getElementById('reading-room-content').innerHTML = s.reading_room || '<p>Briefing unavailable at this time.</p>';

                const sent = s.sentiment || 50;
                const sLab = document.getElementById('sentiment-label');
                sLab.innerText = sent + '%';
                sLab.className = 'text-2xl font-bold ' + (sent > 60 ? 'text-emerald-600' : (sent < 40 ? 'text-rose-600' : 'text-amber-600'));
                const sFil = document.getElementById('modal-sentiment-fill');
                sFil.style.width = sent + '%';
                sFil.className = 'sentiment-fill ' + (sent > 60 ? 'bg-emerald-500' : (sent < 40 ? 'bg-rose-500' : 'bg-amber-500'));
                
                document.getElementById('map-jurisdictions-text').innerText = (s.jurisdictions || []).slice(0, 4).join(' • ');

            } catch (error) {
                console.error("Data parsing error inside modal:", error);
            } finally {
                // ALWAYS trigger the modal to open, regardless of AI parsing errors above
                document.getElementById('modal').classList.remove('hidden');
                setTimeout(() => { 
                    try { updateMainChart(); } catch(e){} 
                    try { renderMap(db.find(x => x.ticker === activeTicker)?.map_codes || []); } catch(e){}
                }, 100);
            }
        }

        function renderMap(codes) {
            $('#m-map').empty();
            const regionColors = {}; codes.forEach(c => regionColors[c] = '#2563eb'); 
            $('#m-map').vectorMap({
                map: 'world_mill_en', backgroundColor: 'transparent', zoomOnScroll: false,
                regionStyle: { initial: { fill: '#cbd5e1' }, hover: { "fill-opacity": 0.8 } },
                series: { regions: [{ values: regionColors, attribute: 'fill' }] }
            });
        }

        function updateMainChart() {
            const timeframe = document.getElementById('timeframe-select').value;
            const compareTicker = document.getElementById('compare-select').value;
            const s = db.find(x => x.ticker === activeTicker);
            const baseData = (s.history && s.history[timeframe]) ? s.history[timeframe] : [];
            if (chartInstance) chartInstance.destroy();

            let series = []; let isComp = false;
            if (compareTicker) {
                isComp = true; const comp = db.find(x => x.ticker === compareTicker);
                const norm = (d) => d.length ? d.map(p => [p[0], ((p[1] - d[0][1]) / d[0][1]) * 100]) : [];
                series = [{ name: s.company, data: norm(baseData) }, { name: comp.company, data: norm(comp.history[timeframe] || []) }];
            } else { 
                series = [{ name: 'Price', data: baseData }]; 
            }
            
            chartInstance = new ApexCharts(document.querySelector("#main-chart"), {
                series: series,
                chart: { type: isComp ? 'line' : 'area', height: 300, toolbar: { show: false }, zoom: { enabled: false }, fontFamily: 'inherit' },
                dataLabels: { enabled: false },
                markers: { size: 0, hover: { size: 5 } },
                stroke: { curve: 'smooth', width: 2.5 },
                xaxis: { type: 'datetime', labels: { style: { colors: '#94a3b8', fontSize: '11px' } } },
                yaxis: { labels: { style: { colors: '#94a3b8', fontSize: '11px' }, formatter: (v) => isComp ? (v > 0 ? '+' : '') + v.toFixed(2) + '%' : v.toFixed(2) } },
                colors: isComp ? ['#3b82f6', '#8b5cf6'] : ['#3b82f6'],
                fill: { type: isComp ? 'solid' : 'gradient', gradient: { opacityFrom: 0.3, opacityTo: 0 } },
                grid: { borderColor: '#f1f5f9' },
                tooltip: { x: { format: 'dd MMM yyyy' }, y: { formatter: (v) => isComp ? (v > 0 ? '+' : '') + v.toFixed(2) + '%' : v.toFixed(2) }, theme: 'light' },
                legend: { show: isComp, position: 'top', horizontalAlign: 'right' },
                noData: { text: "Loading..." }
            });
            chartInstance.render();
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
        init();
    </script>
</body>
</html>
