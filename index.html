<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGaming Earnings HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/jquery-jvectormap.css">
    <script src="https://cdn.jsdelivr.net/npm/jvectormap@2.0.4/tests/assets/jquery-jvectormap-world-mill-en.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sentiment-bar { height: 6px; border-radius: 3px; background: #e2e8f0; position: relative; }
        .sentiment-fill { height: 100%; border-radius: 3px; transition: width 1s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b border-slate-200 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">iGaming Earnings HQ</h1>
                <p class="text-slate-500">Live Financial Intelligence & Market Sentiment</p>
            </div>
            <div class="flex flex-col items-start md:items-end gap-3 w-full md:w-auto">
                <div id="last-update" class="text-[10px] text-slate-400 font-mono tracking-widest uppercase bg-slate-100 px-2 py-1 rounded">Loading Data...</div>
                
                <div class="flex items-center gap-2 w-full">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider hidden sm:inline">Sort By:</span>
                    <select id="sort-select" onchange="applySort()" class="bg-white border border-slate-200 text-sm rounded-lg px-4 py-2 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm w-full md:w-auto cursor-pointer">
                        <option value="earnings">Nearest Earnings Date</option>
                        <option value="alpha">Alphabetical</option>
                        <option value="exchange">Stock Exchange Group</option>
                        <option value="beat">Highest EPS Beat</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="stock-grid">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-6xl max-h-[95vh] overflow-y-auto shadow-2xl">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
                <div>
                    <h2 id="modal-title" class="text-2xl font-bold text-slate-900"></h2>
                    <div id="modal-ticker" class="mt-1"></div>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6">
                <div class="bg-blue-50/50 border border-blue-100 rounded-xl p-4 mb-6 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-500 text-white p-2 rounded-lg">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <div>
                            <div class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-0.5">Next Earnings Event</div>
                            <div id="modal-earnings-date" class="text-lg font-black text-slate-800"></div>
                        </div>
                    </div>
                    <div class="text-right flex gap-4 md:gap-6">
                        <div>
                            <div class="text-[10px] font-bold text-slate-400 uppercase">Report Release</div>
                            <div id="modal-report-time" class="text-xs md:text-sm font-bold text-slate-700"></div>
                        </div>
                        <div>
                            <div class="text-[10px] font-bold text-slate-400 uppercase">Conference Call</div>
                            <div id="modal-call-time" class="text-xs md:text-sm font-bold text-blue-600"></div>
                        </div>
                    </div>
                </div>

                <div id="modal-financials" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6 p-4 bg-slate-50 rounded-xl border border-slate-100"></div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 flex flex-col gap-6">
                        
                        <div class="bg-white border border-slate-100 shadow-sm rounded-xl p-2">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-3 px-2 pt-2">
                                <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Market Performance</h3>
                                <div class="flex gap-2 w-full sm:w-auto">
                                    <select id="compare-select" onchange="updateMainChart()" class="text-sm border-slate-200 rounded-md bg-slate-50 px-2 py-1 outline-none font-semibold text-purple-600 w-full sm:w-auto cursor-pointer">
                                        <option value="">Compare...</option>
                                    </select>
                                    <select id="timeframe-select" onchange="updateMainChart()" class="text-sm border-slate-200 rounded-md bg-slate-50 px-2 py-1 outline-none font-semibold text-slate-700 cursor-pointer">
                                        <option value="1d">1 Day</option>
                                        <option value="1w">1 Week</option>
                                        <option value="1m">1 Month</option>
                                        <option value="6m" selected>6 Months</option>
                                        <option value="1y">1 Year</option>
                                        <option value="5y">5 Years</option>
                                    </select>
                                </div>
                            </div>
                            <div id="main-chart" class="w-full min-h-[300px]"></div>
                        </div>

                        <div class="bg-white border border-slate-100 shadow-sm rounded-xl p-4 flex flex-col h-[280px]">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Global Operational Footprint</h3>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" id="map-jurisdictions-text"></div>
                            </div>
                            <div class="relative flex-grow rounded-lg overflow-hidden bg-slate-50 border border-slate-100">
                                <div id="m-map" class="absolute inset-0"></div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3">AI Sentiment</h3>
                            <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                <div class="flex justify-between items-end mb-2">
                                    <span id="sentiment-label" class="text-2xl font-bold"></span>
                                    <span class="text-xs text-slate-400 pb-1">BULLISHNESS</span>
                                </div>
                                <div class="sentiment-bar"><div id="modal-sentiment-fill" class="sentiment-fill"></div></div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-3">Core News Summary</h3>
                            <ul id="news-summary" class="space-y-3 text-sm text-slate-600 leading-relaxed bg-white p-4 rounded-xl border border-slate-100 shadow-sm"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        let activeTicker = null;
        let chartInstance = null;
        let currentSort = 'earnings';

        async function init() {
            try {
                const response = await fetch('gambling_stocks_live.json?v=' + Date.now());
                db = await response.json();
                document.getElementById('last-update').innerText = 'Last Sync: ' + new Date().toLocaleTimeString();
                applySort(); 
            } catch (e) { 
                console.error("Data load failed", e);
                document.getElementById('last-update').innerText = 'Data Fetch Failed';
            }
        }

        function getExchangeGroup(ticker) {
            if (ticker.endsWith('.L')) return 'LSE (UK)';
            if (ticker.endsWith('.ST')) return 'Nasdaq Stockholm';
            if (ticker.endsWith('.PA')) return 'Euronext Paris';
            if (ticker.endsWith('.AX')) return 'ASX (Australia)';
            return 'US Markets (NYSE/NASDAQ)';
        }

        function applySort() {
            currentSort = document.getElementById('sort-select').value;
            let sortedDb = [...db];

            sortedDb.sort((a, b) => {
                if (currentSort === 'earnings') {
                    const dateStrA = a.calendar?.date || a.release_gmt || '';
                    const dateStrB = b.calendar?.date || b.release_gmt || '';
                    const timeA = new Date(dateStrA).getTime();
                    const timeB = new Date(dateStrB).getTime();
                    const finalA = isNaN(timeA) ? Infinity : timeA;
                    const finalB = isNaN(timeB) ? Infinity : timeB;
                    return finalA - finalB;
                } 
                else if (currentSort === 'alpha') {
                    return a.company.localeCompare(b.company);
                } 
                else if (currentSort === 'exchange') {
                    const exA = getExchangeGroup(a.ticker);
                    const exB = getExchangeGroup(b.ticker);
                    if (exA === exB) return a.company.localeCompare(b.company);
                    return exA.localeCompare(exB);
                } 
                else if (currentSort === 'beat') {
                    const beatA = (a.eps_beat_miss_pct !== null && a.eps_beat_miss_pct !== undefined) ? a.eps_beat_miss_pct : -999;
                    const beatB = (b.eps_beat_miss_pct !== null && b.eps_beat_miss_pct !== undefined) ? b.eps_beat_miss_pct : -999;
                    return beatB - beatA;
                }
                return 0;
            });

            renderGrid(sortedDb);
        }

        function renderGrid(dataToRender) {
            const grid = document.getElementById('stock-grid');
            grid.innerHTML = dataToRender.map(s => {
                const color = s.sentiment > 60 ? 'bg-emerald-500' : (s.sentiment < 40 ? 'bg-rose-500' : 'bg-amber-500');
                const isBeat = s.eps_beat_miss_pct > 0;
                const beatColor = isBeat ? 'text-green-600' : 'text-red-500';
                
                const period = s.actuals?.period || 'Q4 25';
                const earningsDate = s.calendar?.date || (s.release_gmt ? new Date(s.release_gmt).toLocaleDateString() : 'TBD');
                const locationLabel = currentSort === 'exchange' ? getExchangeGroup(s.ticker) : s.base_country;
                
                // New Default Text just in case the backend is empty
                const businessFocus = s.focus || 'Diversified Gaming';
                
                return `
                    <div onclick="openModal('${s.ticker}')" class="bg-white p-5 rounded-2xl border border-slate-200 hover:border-blue-400 hover:shadow-xl transition-all cursor-pointer group flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-bold text-slate-900 group-hover:text-blue-600 transition-colors">${s.company}</h3>
                                    <p class="text-[10px] font-mono text-slate-400 mt-1">${s.ticker} • ${locationLabel}</p>
                                    <span class="inline-block mt-2 bg-slate-100 text-slate-600 text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded">${businessFocus}</span>
                                </div>
                                <div class="text-right">
                                    <div class="text-lg font-bold text-slate-900">${s.last_price || 'N/A'}</div>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-2 mb-3 text-[10px] bg-slate-50 p-2 rounded-lg border border-slate-100">
                                <div><span class="text-slate-400 font-bold uppercase">REV (${period})</span><br><span class="font-bold text-slate-800 text-xs">${s.actuals?.revenue || 'N/A'}</span></div>
                                <div class="text-right"><span class="text-slate-400 font-bold uppercase">EPS BEAT/MISS</span><br><span class="font-bold text-xs ${beatColor}">${isBeat ? '▲' : '▼'} ${Math.abs(s.eps_beat_miss_pct || 0)}%</span></div>
                            </div>
                        </div>

                        <div>
                            <div class="text-[10px] font-bold text-slate-500 flex justify-between items-center mb-3 pb-3 border-b border-slate-100">
                                <span>🗓️ NEXT EARNINGS:</span>
                                <span class="text-blue-600">${earningsDate}</span>
                            </div>

                            <div class="sentiment-bar mb-2"><div class="sentiment-fill ${color}" style="width: ${s.sentiment || 50}%"></div></div>
                            <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
                                <span>Sentiment</span>
                                <span>${s.sentiment || 50}%</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(ticker) {
            activeTicker = ticker;
            const s = db.find(x => x.ticker === ticker);
            
            const compareSelect = document.getElementById('compare-select');
            compareSelect.innerHTML = '<option value="">Compare...</option>' + 
                db.filter(x => x.ticker !== ticker)
                  .sort((a, b) => a.company.localeCompare(b.company))
                  .map(x => `<option value="${x.ticker}">${x.company}</option>`)
                  .join('');
            compareSelect.value = "";

            const period = s.actuals?.period || 'Q4 25';
            const businessFocus = s.focus || 'Diversified Gaming';
            
            document.getElementById('modal-title').innerText = s.company;
            // Injecting the beautiful business focus badge right next to the modal ticker
            document.getElementById('modal-ticker').innerHTML = `
                <span class="text-slate-500 font-mono text-sm">${ticker} | ${s.base_country} Based</span>
                <span class="ml-3 inline-block bg-blue-100 text-blue-700 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded align-middle">${businessFocus}</span>
            `;
            
            document.getElementById('modal-earnings-date').innerText = s.calendar?.date || 'TBD';
            document.getElementById('modal-report-time').innerText = s.calendar?.report_time || 'TBD';
            document.getElementById('modal-call-time').innerText = s.calendar?.call_time || 'TBD';

            document.getElementById('modal-financials').innerHTML = `
                <div><div class="text-[10px] font-bold text-slate-400 uppercase">EPS (Act vs Est)</div><div class="font-mono text-sm font-bold">${s.actuals?.eps_actual || 'N/A'} <span class="text-slate-400">/ ${s.actuals?.eps_forecast || 'N/A'}</span></div></div>
                <div><div class="text-[10px] font-bold text-slate-400 uppercase">REV (${period})</div><div class="font-mono text-sm font-bold">${s.actuals?.revenue || 'N/A'}</div></div>
                <div><div class="text-[10px] font-bold text-slate-400 uppercase">EBITDA</div><div class="font-mono text-sm font-bold">${s.actuals?.ebitda || 'N/A'}</div></div>
                <div><div class="text-[10px] font-bold text-slate-400 uppercase">Net Income</div><div class="font-mono text-sm font-bold ${(s.actuals?.net_income || '').includes('-') ? 'text-red-500' : ''}">${s.actuals?.net_income || 'N/A'}</div></div>
                <div><div class="text-[10px] font-bold text-slate-400 uppercase">FCF</div><div class="font-mono text-sm font-bold">${s.actuals?.fcf || 'N/A'}</div></div>
            `;
            
            const newsHtml = (s.news_summary || []).map(item => `<li class="flex gap-2"><span class="text-blue-500">•</span>${item}</li>`).join('');
            document.getElementById('news-summary').innerHTML = newsHtml || '<li>No news available.</li>';
            
            const sentLabel = document.getElementById('sentiment-label');
            sentLabel.innerText = (s.sentiment || 50) + '%';
            sentLabel.className = 'text-2xl font-bold ' + ((s.sentiment || 50) > 60 ? 'text-emerald-600' : ((s.sentiment || 50) < 40 ? 'text-rose-600' : 'text-amber-600'));
            
            const sentFill = document.getElementById('modal-sentiment-fill');
            sentFill.style.width = (s.sentiment || 50) + '%';
            sentFill.className = 'sentiment-fill ' + ((s.sentiment || 50) > 60 ? 'bg-emerald-500' : ((s.sentiment || 50) < 40 ? 'bg-rose-500' : 'bg-amber-500'));

            // Map Logic
            const jurisdictionList = s.jurisdictions || [];
            document.getElementById('map-jurisdictions-text').innerText = jurisdictionList.slice(0, 4).join(' • ') + (jurisdictionList.length > 4 ? '...' : '');
            
            document.getElementById('modal').classList.remove('hidden');
            
            // Allow the modal to finish animating open before rendering the map to ensure proper sizing
            setTimeout(() => {
                updateMainChart();
                renderMap(s.map_codes || []);
            }, 100);
        }

       function renderMap(codes) {
            $('#m-map').empty();
            
            // Explicitly force the specific countries to be dark blue
            const regionColors = {};
            codes.forEach(c => regionColors[c] = '#2563eb'); 
            
            $('#m-map').vectorMap({
                map: 'world_mill_en', 
                backgroundColor: 'transparent',
                zoomOnScroll: false,
                regionStyle: { 
                    initial: { fill: '#cbd5e1', stroke: 'none' }, // Default grey for unused countries
                    hover: { "fill-opacity": 0.8, cursor: 'default' }
                },
                series: { 
                    regions: [{ 
                        values: regionColors, 
                        attribute: 'fill' // Force bypasses scale calculation
                    }] 
                }
            });
        }

        function updateMainChart() {
            const timeframe = document.getElementById('timeframe-select').value;
            const compareTicker = document.getElementById('compare-select').value;
            
            const s = db.find(x => x.ticker === activeTicker);
            const baseData = (s.history && s.history[timeframe]) ? s.history[timeframe] : [];
            
            let seriesData = [];
            let chartColors = [];
            let isCompareMode = false;

            if (chartInstance) chartInstance.destroy();

            if (compareTicker) {
                isCompareMode = true;
                const comp = db.find(x => x.ticker === compareTicker);
                const compData = (comp.history && comp.history[timeframe]) ? comp.history[timeframe] : [];

                const normalizeToPercent = (data) => {
                    if (!data || data.length === 0) return [];
                    const basePrice = data[0][1];
                    return data.map(pt => [pt[0], ((pt[1] - basePrice) / basePrice) * 100]);
                };

                seriesData.push({ name: s.company, data: normalizeToPercent(baseData) });
                seriesData.push({ name: comp.company, data: normalizeToPercent(compData) });
                chartColors = ['#3b82f6', '#8b5cf6']; 
            } else {
                seriesData.push({ name: 'Price', data: baseData });
                chartColors = ['#3b82f6'];
            }
            
            chartInstance = new ApexCharts(document.querySelector("#main-chart"), {
                series: seriesData,
                chart: { 
                    type: isCompareMode ? 'line' : 'area', 
                    height: 300, 
                    toolbar: { show: false },
                    zoom: { enabled: false },
                    fontFamily: 'inherit'
                },
                dataLabels: { enabled: false },
                markers: { size: 0, hover: { size: 6 } },
                stroke: { curve: 'smooth', width: 2.5 },
                xaxis: { 
                    type: 'datetime', 
                    labels: { style: { colors: '#94a3b8', fontSize: '11px' } } 
                },
                yaxis: { 
                    labels: { 
                        style: { colors: '#94a3b8', fontSize: '11px' }, 
                        formatter: (v) => isCompareMode ? (v > 0 ? '+' : '') + v.toFixed(2) + '%' : v.toFixed(2) 
                    } 
                },
                colors: chartColors,
                fill: { 
                    type: isCompareMode ? 'solid' : 'gradient', 
                    gradient: { opacityFrom: 0.3, opacityTo: 0 } 
                },
                grid: { borderColor: '#f1f5f9' },
                tooltip: { 
                    x: { format: 'dd MMM yyyy' }, 
                    y: { formatter: (v) => isCompareMode ? (v > 0 ? '+' : '') + v.toFixed(2) + '%' : v.toFixed(2) },
                    theme: 'light' 
                },
                legend: { show: isCompareMode, position: 'top', horizontalAlign: 'right' },
                noData: { text: "Loading..." }
            });
            
            chartInstance.render();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        init();
    </script>
</body>
</html>
